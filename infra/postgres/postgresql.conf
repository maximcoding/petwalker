# petwalker / postgres tuning — dev defaults
# Production should mount a different file or use parameter group on RDS.

# --- connections ---
listen_addresses = '*'
port = 5432
max_connections = 100

# --- memory (dev box: ~1GB allocated) ---
shared_buffers = 256MB
work_mem = 16MB
maintenance_work_mem = 64MB
effective_cache_size = 768MB

# --- WAL / durability (dev: relaxed for speed) ---
wal_level = replica
synchronous_commit = on
checkpoint_timeout = 10min
max_wal_size = 1GB
min_wal_size = 80MB

# --- planner ---
random_page_cost = 1.1
effective_io_concurrency = 200

# --- logging ---
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 250
log_line_prefix = '%t [%p] %q%u@%d '
log_statement = 'none'
log_lock_waits = on

# --- locale / timezone ---
timezone = 'UTC'
log_timezone = 'UTC'
datestyle = 'iso, mdy'
default_text_search_config = 'pg_catalog.english'

# --- extensions auto-loaded later via init SQL: pgcrypto, citext ---
