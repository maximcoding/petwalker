# PostgreSQL Client Authentication Configuration File — petwalker
# TYPE  DATABASE        USER            ADDRESS                 METHOD
#
# DEV-ONLY config. Allows connections from any IP because Docker Desktop on
# macOS / Windows can NAT host→container traffic so the source IP is not in
# a private range (e.g. when Tailscale, Cloudflare WARP, or a corp VPN is on).
# The container's port is bound to 127.0.0.1 in docker-compose, so externally
# unreachable. PROD MUST use a stricter file (RDS handles this for you anyway).

# local unix socket — used by docker-entrypoint init scripts
local   all             all                                     trust

# host — accept any IPv4 / IPv6, password required
host    all             all             0.0.0.0/0               scram-sha-256
host    all             all             ::/0                    scram-sha-256

# replication (disabled in dev — uncomment for streaming replica)
# host    replication     replicator      0.0.0.0/0               scram-sha-256
