name: petwalker

services:
  postgres:
    image: postgres:16-alpine
    container_name: petwalker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      # Bind to localhost only — the relaxed pg_hba.conf inside trusts any IP,
      # so we keep the container off the public network at the host level.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - petwalker

  redis:
    image: redis:7-alpine
    container_name: petwalker-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - petwalker

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: petwalker-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - petwalker

  # ────────── DEV-ONLY: MinIO (S3-compatible) ──────────
  # In prod, swap AWS_S3_ENDPOINT in .env for empty string and the SDK talks
  # to real AWS S3. Bucket auto-creation happens in the backend on boot (dev only).
  minio:
    image: minio/minio:latest
    container_name: petwalker-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"     # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Web UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - petwalker

  # ────────── DEV-ONLY: cognito-local ──────────
  # Implements the Cognito User Pool API. The .cognito volume is preloaded
  # with one pool (local_petwalker) + one client (petwalker_local_client) —
  # see ./cognito-local/.cognito/db/. IDs match the defaults in env.ts.
  cognito-local:
    image: jagregory/cognito-local:latest
    container_name: petwalker-cognito-local
    restart: unless-stopped
    ports:
      - "${COGNITO_LOCAL_PORT:-9229}:9229"
    volumes:
      - ./cognito-local/.cognito:/app/.cognito
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9229/health || exit 0"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - petwalker

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  minio_data:

networks:
  petwalker:
    driver: bridge
